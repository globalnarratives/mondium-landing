<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondium — The World, Encoded</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="brand-anchor">
        <img src="mondium-logo.png" alt="Mondium" class="brand-logo">
    </div>

    <section class="scrolly-timeline-s1" id="timeline-s1">
        <div class="sticky-viewport-frame" id="viewport-s1">
            <div class="stage-stack">

                <h1 id="phrase-1" class="dimensional-text" style="opacity: 1; transform: translateY(0px);">
                    All events have a language.<br>But you've only ever read the translation.
                </h1>

                <h1 id="phrase-2" class="dimensional-text">
                    Now read them in the Original.
                </h1>

                <h1 id="phrase-3" class="dimensional-text">
                    Introducing
                </h1>

                <h1 id="phrase-4" class="dimensional-text phrase-4-style">
                    Compressed Information Expression
                </h1>

                <h1 id="phrase-5" class="dimensional-text">
                    The Source Code for global events.
                </h1>

            </div>
        </div>
    </section>

    <script>
    const cssVars = getComputedStyle(document.documentElement);
    const darkHex  = cssVars.getPropertyValue('--color-origin-dark').trim();
    const lightHex = cssVars.getPropertyValue('--color-meridian-blue').trim();

    function hexToRgb(hex) {
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
        return [
            parseInt(hex.substring(0, 2), 16),
            parseInt(hex.substring(2, 4), 16),
            parseInt(hex.substring(4, 6), 16)
        ];
    }

    function lerpColor(a, b, t) {
        return `rgb(${Math.round(a[0] + (b[0] - a[0]) * t)},${
                     Math.round(a[1] + (b[1] - a[1]) * t)},${
                     Math.round(a[2] + (b[2] - a[2]) * t)})`;
    }

    const rgbDark  = hexToRgb(darkHex);
    const rgbLight = hexToRgb(lightHex);

    // Solo phrase helper — used for Phrase 5
    function applyPhrase(el, p, entryStart, entryEnd, exitStart, exitEnd) {
        let opacity, translateY;
        if (p < entryStart) {
            opacity = 0;
            translateY = 20;
        } else if (p <= entryEnd) {
            const t = (p - entryStart) / (entryEnd - entryStart);
            opacity = t;
            translateY = 20 - (t * 20);
        } else if (exitStart === null || p <= exitStart) {
            opacity = 1;
            translateY = 0;
        } else if (p <= exitEnd) {
            const t = (p - exitStart) / (exitEnd - exitStart);
            opacity = 1 - t;
            translateY = t * -20;
        } else {
            opacity = 0;
            translateY = -20;
        }
        el.style.opacity = opacity;
        el.style.transform = `translateY(${translateY}px)`;
    }

    window.addEventListener('scroll', () => {
        const track    = document.getElementById('timeline-s1');
        const viewport = document.getElementById('viewport-s1');
        const p1 = document.getElementById('phrase-1');
        const p2 = document.getElementById('phrase-2');
        const p3 = document.getElementById('phrase-3');
        const p4 = document.getElementById('phrase-4');
        const p5 = document.getElementById('phrase-5');

        const rect = track.getBoundingClientRect();
        if (rect.top > 0 || rect.bottom < window.innerHeight) return;

        const raw = Math.abs(rect.top) / (rect.height - window.innerHeight);
        const p = Math.min(Math.max(raw, 0), 1);

        // Background: hold dark through 0.50, interpolate to meridian blue by 1.0
        let bgColor;
        if (p <= 0.50) {
            bgColor = darkHex;
        } else {
            const t = (p - 0.50) / 0.50;
            bgColor = lerpColor(rgbDark, rgbLight, t);
        }
        viewport.style.backgroundColor = bgColor;

        // ── BEAT A: Phrase 1 + Phrase 2 stacked pair ─────────────────────────
        // All phrases share grid-area:1/1, so translateY offsets create the
        // vertical split rather than document flow. ±50px places each phrase
        // 50px above/below the viewport center when paired.
        if (p < 0.08) {
            // Phrase 1 solo, centered
            p1.style.opacity = 1;
            p1.style.transform = 'translateY(0px)';
            p2.style.opacity = 0;
            p2.style.transform = 'translateY(100px)';
        } else if (p <= 0.18) {
            // Phrase 2 sliding in below; Phrase 1 shifting upward
            const t = (p - 0.08) / (0.18 - 0.08);
            p1.style.opacity = 1;
            p1.style.transform = `translateY(${-50 * t}px)`;
            p2.style.opacity = t;
            p2.style.transform = `translateY(${100 - 50 * t}px)`;
        } else if (p <= 0.35) {
            // Pair hold: Phrase 1 above center, Phrase 2 below center
            p1.style.opacity = 1;
            p1.style.transform = 'translateY(-50px)';
            p2.style.opacity = 1;
            p2.style.transform = 'translateY(50px)';
        } else if (p <= 0.44) {
            // Beat B: both fade out together
            const t = (p - 0.35) / (0.44 - 0.35);
            p1.style.opacity = 1 - t;
            p1.style.transform = `translateY(${-50 - 20 * t}px)`;
            p2.style.opacity = 1 - t;
            p2.style.transform = `translateY(${50 - 20 * t}px)`;
        } else {
            p1.style.opacity = 0;
            p1.style.transform = 'translateY(-70px)';
            p2.style.opacity = 0;
            p2.style.transform = 'translateY(30px)';
        }

        // ── BEAT B→C: Phrase 3 solo entry, then pairs with Phrase 4 ──────────
        if (p < 0.42) {
            p3.style.opacity = 0;
            p3.style.transform = 'translateY(20px)';
        } else if (p <= 0.52) {
            // Solo entry
            const t = (p - 0.42) / (0.52 - 0.42);
            p3.style.opacity = t;
            p3.style.transform = `translateY(${20 - 20 * t}px)`;
        } else if (p <= 0.62) {
            // Solo hold
            p3.style.opacity = 1;
            p3.style.transform = 'translateY(0px)';
        } else if (p <= 0.72) {
            // Phrase 4 entering below; Phrase 3 shifts upward
            const t = (p - 0.62) / (0.72 - 0.62);
            p3.style.opacity = 1;
            p3.style.transform = `translateY(${-50 * t}px)`;
        } else if (p <= 0.80) {
            // Pair hold
            p3.style.opacity = 1;
            p3.style.transform = 'translateY(-50px)';
        } else if (p <= 0.88) {
            // Beat D: exit with Phrase 4
            const t = (p - 0.80) / (0.88 - 0.80);
            p3.style.opacity = 1 - t;
            p3.style.transform = `translateY(${-50 - 20 * t}px)`;
        } else {
            p3.style.opacity = 0;
            p3.style.transform = 'translateY(-70px)';
        }

        // ── BEAT C: Phrase 4 enters below Phrase 3 ───────────────────────────
        if (p < 0.62) {
            p4.style.opacity = 0;
            p4.style.transform = 'translateY(100px)';
        } else if (p <= 0.72) {
            // Sliding in below Phrase 3
            const t = (p - 0.62) / (0.72 - 0.62);
            p4.style.opacity = t;
            p4.style.transform = `translateY(${100 - 50 * t}px)`;
        } else if (p <= 0.80) {
            // Pair hold
            p4.style.opacity = 1;
            p4.style.transform = 'translateY(50px)';
        } else if (p <= 0.88) {
            // Beat D: exit with Phrase 3
            const t = (p - 0.80) / (0.88 - 0.80);
            p4.style.opacity = 1 - t;
            p4.style.transform = `translateY(${50 - 20 * t}px)`;
        } else {
            p4.style.opacity = 0;
            p4.style.transform = 'translateY(30px)';
        }

        // ── BEAT D: Phrase 5 solo, holds to end ──────────────────────────────
        applyPhrase(p5, p, 0.86, 0.94, null, null);
    });
    </script>

</body>
</html>
